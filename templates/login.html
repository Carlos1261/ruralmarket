{% extends 'base.html' %}
{% block content %}
<h2>Login</h2>
{% with msgs = get_flashed_messages() %}
  {% if msgs %}<p style="color:red">{{ msgs[0] }}</p>{% endif %}
{% endwith %}
<form method="POST" class="form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>Email ou nome de utilizador</label>
  <input type="text" name="email" placeholder="Email ou nome de utilizador" required>
  <label>Senha</label>
  <input type="password" name="senha" placeholder="Senha" required>
  <button type="submit">Entrar</button>
</form>
<p style="margin-top:1rem;font-family:sans-serif;font-size:0.9rem">
  Ainda não tens conta? <a href="/registro" style="color:#5a8a2a">Registar</a>
</p>
{% endblock %}
