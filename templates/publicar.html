{% extends "base.html" %}
{% block content %}
<form method="POST" class="form" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <h1>Publicar Anúncio</h1>

  <label>Categoria</label>
  <select name="categoria" required>
    <option value="">-- Escolhe --</option>
    <option>🏠 Casas</option>
    <option>🚗 Carros</option>
    <option>🚜 Tratores e Máquinas</option>
    <option>🛒 Carretas e Reboques</option>
    <option>🌾 Terrenos Agrícolas</option>
    <option>🐄 Animais</option>
    <option>🔧 Ferramentas</option>
    <option>🌱 Produtos Agrícolas</option>
    <option>📦 Outros</option>
  </select>

  <label>Título</label>
  <input type="text" name="titulo" placeholder="Ex: Trator John Deere 85cv" maxlength="120" required>

  <label>Descrição</label>
  <textarea name="descricao" placeholder="Descreve o que estás a vender..." maxlength="2000"></textarea>

  <label>Preço (€)</label>
  <input type="number" name="preco" placeholder="0" step="0.01" min="0" required>

  <label>Localização</label>
  <input type="text" name="localizacao" placeholder="Ex: Bragança, Moncorvo..." maxlength="120" required>

  <label>Contacto</label>
  <input type="text" name="contacto" placeholder="Telemóvel ou email" maxlength="80" required>

  <label>Fotos (máximo 15, JPG/PNG/WebP, 5MB cada)</label>
  <input type="file" name="fotos" accept="image/jpeg,image/png,image/webp" multiple>
  <p style="font-family:sans-serif;font-size:0.8rem;color:var(--texto-muted);margin-top:-0.5rem">
    Podes selecionar várias fotos ao mesmo tempo.
  </p>

  <button type="submit">✓ Publicar</button>
</form>
{% endblock %}
