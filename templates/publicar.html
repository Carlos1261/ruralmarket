{% extends "base.html" %}
{% block content %}
<form method="POST" class="form" enctype="multipart/form-data">
  <h1>Publicar Anúncio</h1>
  <label>Categoria</label>
  <select name="categoria" required>
    <option value="">-- Escolhe --</option>
    <option>Gado</option>
    <option>Máquinas</option>
    <option>Terrenos</option>
    <option>Produtos Agrícolas</option>
    <option>Animais</option>
    <option>Serviços</option>
    <option>Outros</option>
  </select>
  <label>Título</label>
  <input type="text" name="titulo" placeholder="Ex: Trator John Deere 85cv" required>
  <label>Descrição</label>
  <textarea name="descricao" placeholder="Descreve o que estás a vender..."></textarea>
  <label>Preço (€)</label>
  <input type="number" name="preco" placeholder="0" step="0.01" required>
  <label>Localização</label>
  <input type="text" name="localizacao" placeholder="Ex: Bragança, Moncorvo..." required>
  <label>Contacto</label>
  <input type="text" name="contacto" placeholder="Telemóvel ou email" required>
  <label>Foto (opcional)</label>
  <input type="file" name="foto" accept="image/*">
  <button type="submit">✓ Publicar</button>
</form>
{% endblock %}
