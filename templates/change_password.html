{% extends 'base.html' %}
{% block content %}

<h2 style="color:#2d4a1a;margin-bottom:1rem">Alterar Senha</h2>

{% with msgs = get_flashed_messages() %}
  {% if msgs %}
    <p style="color:red;font-family:sans-serif;margin-bottom:1rem">{{ msgs[0] }}</p>
  {% endif %}
{% endwith %}

<form method="POST" class="form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>Senha atual</label>
  <input type="password" name="senha_atual" required>

  <label>Nova senha</label>
  <input type="password" name="nova_senha" required>

  <label>Confirmar nova senha</label>
  <input type="password" name="confirmar" required>

  <button type="submit">✓ Alterar Senha</button>
</form>

<p style="margin-top:1rem;font-family:sans-serif;font-size:0.9rem">
  <a href="/anuncios" style="color:#5a8a2a">← Voltar</a>
</p>

{% endblock %}
